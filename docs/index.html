<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel SportsLab</title>
    <meta name="description" content="Athlete monitoring & performance intelligence for sport scientists, coaches, and performance staff." />
    <meta name="theme-color" content="#4f46e5" />
    <!-- iOS install-to-home-screen support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SportsLab" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Web app manifest is generated + injected by vite-plugin-pwa at build time -->
    <!-- Apply dark class before React hydrates to prevent flash -->
    <script>
      try {
        if (localStorage.getItem('sentinel_dark_mode') === 'true') {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-[#0D1829] text-slate-900 dark:text-[#E2E8F0] transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
